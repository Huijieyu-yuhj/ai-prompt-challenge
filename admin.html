<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Challenge - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f1a24 0%, #1a2a3a 50%, #2c3e50 100%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 30px 20px 20px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FF8C42, #f39c12);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .header p { color: #94a3b8; font-size: 14px; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title i { color: #f39c12; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-item {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value { font-size: 32px; font-weight: 800; color: #f39c12; }
        .stat-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-active { background: rgba(34,197,94,0.15); color: #22c55e; }
        .status-ended { background: rgba(239,68,68,0.15); color: #ef4444; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: #1a2a3a;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(243,156,18,0.4); }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
        }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(239,68,68,0.4); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .qr-section {
            text-align: center;
            padding: 20px;
        }
        .qr-code {
            width: 200px;
            height: 200px;
            margin: 16px auto;
            background: #fff;
            padding: 12px;
            border-radius: 12px;
        }
        .qr-code canvas { width: 100% !important; height: 100% !important; }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: #94a3b8;
        }
        .loading i { margin-right: 8px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .login-box {
            background: linear-gradient(135deg, #1a2a3a, #2c3e50);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 360px;
            width: 90%;
        }
        .login-box h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .login-box p { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
        .login-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .login-input:focus { outline: none; border-color: #f39c12; }
        .login-error { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; }
        .back-link {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #94a3b8;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> Admin Login</h2>
            <p>Enter admin password to continue</p>
            <input type="password" class="login-input" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
            <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
            <button class="btn btn-primary" onclick="login()" style="width: 100%; justify-content: center;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>
    </div>

    <!-- Admin Content -->
    <div id="adminContent" class="hidden">
        <div class="header">
            <h1><i class="fas fa-cog"></i> Admin Panel</h1>
            <p>Manage voting session and view results</p>
        </div>

        <div class="container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalVoters">0</div>
                    <div class="stat-label">Total Voters</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalVotes">0</div>
                    <div class="stat-label">Total Votes</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="sessionStatus">-</div>
                    <div class="stat-label">Session Status</div>
                </div>
            </div>

            <!-- Voting Session Control -->
            <div class="card">
                <div class="card-title"><i class="fas fa-play-circle"></i> Voting Session Control</div>
                <div class="btn-group">
                    <button class="btn btn-primary" id="startBtn" onclick="startSession()">
                        <i class="fas fa-play"></i> Start Voting
                    </button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopSession()">
                        <i class="fas fa-stop"></i> Stop Voting
                    </button>
                    <button class="btn btn-danger" id="resetBtn" onclick="resetSession()">
                        <i class="fas fa-trash"></i> Reset All Votes
                    </button>
                </div>
            </div>

            <!-- QR Code -->
            <div class="card">
                <div class="card-title"><i class="fas fa-qrcode"></i> Voting QR Code</div>
                <div class="qr-section">
                    <p style="color: #94a3b8; margin-bottom: 12px;">Scan this QR code to access the voting page</p>
                    <div class="qr-code" id="qrCode"></div>
                    <p style="color: #64748b; font-size: 12px; margin-top: 12px;" id="qrUrl"></p>
                </div>
            </div>

            <!-- Export -->
            <div class="card">
                <div class="card-title"><i class="fas fa-download"></i> Export Results</div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="exportCSV()">
                        <i class="fas fa-file-csv"></i> Export as CSV
                    </button>
                    <button class="btn btn-secondary" onclick="exportJSON()">
                        <i class="fas fa-file-code"></i> Export as JSON
                    </button>
                </div>
            </div>
        </div>

        <a href="results.html" class="back-link"><i class="fas fa-chart-bar"></i> View Results</a>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="voting-config.js"></script>
    <script>
        // ===== Login =====
        function login() {
            const password = document.getElementById('passwordInput').value;
            if (password === VOTING_CONFIG.ADMIN_PASSWORD) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                initAdmin();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // ===== Admin Functions =====
        async function initAdmin() {
            await loadStats();
            generateQRCode();
        }

        async function loadStats() {
            try {
                const votesData = await SupabaseAPI.getAllVotes();
                const votes = Array.isArray(votesData) ? votesData : (votesData.results || []);

                document.getElementById('totalVoters').textContent = votes.length;
                document.getElementById('totalVotes').textContent =
                    votes.reduce((sum, v) =>
                        sum + (v.best_c_votes?.length || 0) + (v.prompt_m_votes?.length || 0), 0);

                const session = await SupabaseAPI.getVotingSession();
                const statusEl = document.getElementById('sessionStatus');
                if (session && session.is_active) {
                    statusEl.textContent = 'Active';
                    statusEl.style.color = '#22c55e';
                } else {
                    statusEl.textContent = 'Ended';
                    statusEl.style.color = '#ef4444';
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function startSession() {
            if (!confirm('Start voting session? Participants will be able to vote.')) return;

            try {
                const session = await SupabaseAPI.getVotingSession();
                if (session) {
                    await SupabaseAPI.update('voting_session', 'id', session.id, { is_active: true });
                } else {
                    await SupabaseAPI.create('voting_session', { is_active: true });
                }
                alert('Voting session started!');
                loadStats();
            } catch (error) {
                console.error('Failed to start session:', error);
                alert('Failed to start session. Please try again.');
            }
        }

        async function stopSession() {
            if (!confirm('Stop voting session? Participants will no longer be able to vote.')) return;

            try {
                const session = await SupabaseAPI.getVotingSession();
                if (session) {
                    await SupabaseAPI.update('voting_session', 'id', session.id, { is_active: false });
                }
                alert('Voting session stopped!');
                loadStats();
            } catch (error) {
                console.error('Failed to stop session:', error);
                alert('Failed to stop session. Please try again.');
            }
        }

        async function resetSession() {
            if (!confirm('WARNING: This will delete ALL votes. This action cannot be undone. Continue?')) return;
            if (!confirm('Are you absolutely sure? All voting data will be permanently deleted.')) return;

            try {
                await SupabaseAPI.deleteAllVotes();
                alert('All votes have been deleted.');
                loadStats();
            } catch (error) {
                console.error('Failed to reset votes:', error);
                alert('Failed to reset votes. Please try again.');
            }
        }

        // ===== QR Code =====
        function generateQRCode() {
            const url = VOTING_CONFIG.VOTING_PAGE_URL;
            document.getElementById('qrUrl').textContent = url;

            if (typeof QRCode !== 'undefined') {
                QRCode.toCanvas(document.getElementById('qrCode'), url, {
                    width: 176,
                    margin: 1,
                    color: { dark: '#1a2a3a', light: '#ffffff' }
                }, function (error) {
                    if (error) console.error('QR Code generation failed:', error);
                });
            } else {
                document.getElementById('qrCode').innerHTML = '<p style="color: #64748b; padding: 40px;">QR library not loaded</p>';
            }
        }

        // ===== Export =====
        async function exportCSV() {
            try {
                const votesData = await SupabaseAPI.getAllVotes();
                const votes = Array.isArray(votesData) ? votesData : (votesData.results || []);

                if (votes.length === 0) {
                    alert('No votes to export.');
                    return;
                }

                let csv = 'Voter Session ID,Best Creative Votes,Prompt Master Votes,Timestamp\n';
                votes.forEach(v => {
                    const creative = (v.best_c_votes || []).join('; ');
                    const prompt = (v.prompt_m_votes || []).join('; ');
                    const time = v.created_at || '';
                    csv += `"${v.voter_session_id}","${creative}","${prompt}","${time}"\n`;
                });

                downloadFile(csv, 'voting-results.csv', 'text/csv');
            } catch (error) {
                console.error('Export failed:', error);
                alert('Failed to export results.');
            }
        }

        async function exportJSON() {
            try {
                const votesData = await SupabaseAPI.getAllVotes();
                const votes = Array.isArray(votesData) ? votesData : (votesData.results || []);

                if (votes.length === 0) {
                    alert('No votes to export.');
                    return;
                }

                const json = JSON.stringify(votes, null, 2);
                downloadFile(json, 'voting-results.json', 'application/json');
            } catch (error) {
                console.error('Export failed:', error);
                alert('Failed to export results.');
            }
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Auto-refresh stats every 10 seconds
        setInterval(() => {
            if (!document.getElementById('adminContent').classList.contains('hidden')) {
                loadStats();
            }
        }, 10000);
    </script>
</body>
</html>
